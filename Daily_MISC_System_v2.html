<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EXE — Class Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --acc:  #1B6FC8;
  --acc2: #EEF5FF;
  --grn:  #0D7A5F;
  --grn2: #E6F7F3;
  --red:  #C0392B;
  --red2: #FEF0EF;
  --amb:  #B45309;
  --amb2: #FEF8EC;
  --pur:  #6B3FA0;
  --pur2: #F3EEF9;

  --bg:   #F2F0EC;
  --sur:  #FFFFFF;
  --bdr:  #E2DFD8;
  --bdr2: #C9C6BE;
  --txt:  #1C1A18;
  --sub:  #6B6762;
  --mute: #A09D98;
  --hint: #D0CEC9;

  --r:    10px;
  --r-sm: 6px;

  font-family: 'DM Sans', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-size: 13px; line-height: 1.45; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
button, input, textarea { font-family: inherit; }

/* ── TOP BAR ── */
.topbar {
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  height: 50px;
  position: sticky; top: 0; z-index: 60;
  box-shadow: 0 1px 0 var(--bdr);
}
.topbar-brand { font-size: 15px; font-weight: 700; color: var(--txt); letter-spacing: -.3px; }
.topbar-brand span { color: var(--acc); }
.topbar-info { font-size: 11px; color: var(--sub); }
.flash { font-size: 10px; color: var(--grn); font-weight: 600; opacity: 0; transition: opacity .25s; }
.flash.on { opacity: 1; }

/* ── BOTTOM NAV ── */
.botnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--sur);
  border-top: 1px solid var(--bdr);
  display: grid; grid-template-columns: repeat(4, 1fr);
  z-index: 60;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bnav-tab {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 6px;
  border: none; background: none;
  font-size: 9px; font-weight: 600;
  color: var(--mute); letter-spacing: .04em; text-transform: uppercase;
  gap: 3px;
}
.bnav-tab .ico { font-size: 20px; line-height: 1; }
.bnav-tab.on { color: var(--acc); }
.bnav-tab.on .bnav-ico { background: var(--acc2); border-radius: 16px; }

/* ── PAGES ── */
.page { display: none; padding-bottom: 70px; }
.page.on { display: block; }

/* ── SECTION CARDS ── */
.card {
  background: var(--sur);
  border-radius: var(--r);
  border: 1px solid var(--bdr);
  margin: 10px;
  overflow: hidden;
}
.card-hdr {
  padding: 11px 14px;
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  background: #FAFAF8;
}
.card-hdr-title { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .05em; }

/* ── BUTTONS ── */
.btn {
  border: 1px solid var(--bdr);
  background: var(--sur);
  border-radius: var(--r-sm);
  padding: 7px 13px;
  font-size: 12px; font-weight: 500;
  color: var(--txt); cursor: pointer;
}
.btn:active { transform: scale(.97); }
.btn-pri { background: var(--acc); color: #fff; border-color: var(--acc); font-weight: 600; }
.btn-grn { background: var(--grn); color: #fff; border-color: var(--grn); font-weight: 600; }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-ghost { background: none; border-color: transparent; color: var(--sub); }

/* ── INPUT ── */
.inp {
  width: 100%; border: 1px solid var(--bdr);
  border-radius: var(--r-sm); padding: 8px 10px;
  font-size: 13px; background: var(--sur); color: var(--txt);
}
.inp:focus { outline: none; border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc2); }
textarea.inp { resize: vertical; min-height: 56px; line-height: 1.5; }

/* ────────────────────────────────────────────
   PAGE 1 — LESSON PLAN GRID
   ──────────────────────────────────────────── */
#page-plan { padding-bottom: 70px; }

.plan-toolbar {
  padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.plan-mode-badge {
  font-size: 10px; padding: 3px 9px;
  border-radius: 20px;
  font-weight: 600; letter-spacing: .04em;
}
.plan-mode-badge.view  { background: var(--grn2); color: var(--grn); }
.plan-mode-badge.edit  { background: var(--amb2); color: var(--amb); }

/* The frozen-column grid table */
.grid-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 10px 10px;
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  background: var(--sur);
}
.grid-table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 100%;
}
.grid-table th, .grid-table td {
  border: 1px solid var(--bdr);
  vertical-align: top;
  font-size: 11px;
}
/* frozen label column */
.grid-table .col-label {
  position: sticky; left: 0; z-index: 2;
  background: #F7F5F1;
  min-width: 104px; width: 104px;
  padding: 7px 8px;
  font-weight: 700; font-size: 11px; color: var(--sub);
  border-right: 2px solid var(--bdr2);
}
/* top-left corner */
.grid-table .col-corner {
  position: sticky; left: 0; z-index: 3;
  background: #EDEAE4;
  min-width: 104px; width: 104px;
  padding: 7px 8px;
  border-right: 2px solid var(--bdr2);
}
/* date header cells */
.grid-table .col-date {
  min-width: 140px; width: 140px;
  padding: 6px 8px;
  text-align: center;
  background: #FAFAF8;
  font-weight: 600; font-size: 10px; color: var(--sub);
  vertical-align: middle;
}
.grid-table .col-date.today-col { background: var(--acc2); color: var(--acc); }
.grid-table .col-date.past-col  { background: #F5F5F3; color: var(--mute); }
.grid-table .col-date .wk-badge {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 6px;
  margin-bottom: 2px;
}
/* data cells */
.grid-table .col-data {
  min-width: 140px; width: 140px;
  padding: 6px 8px;
  font-size: 11px; color: var(--txt);
  line-height: 1.4;
}
.grid-table .col-data.today-col { background: #FAFEFF; }
.grid-table .col-data.past-col  { background: #FAFAF8; color: var(--sub); }
.grid-table .col-data.empty-cell { color: var(--hint); font-style: italic; }

/* Edit mode cells */
.cell-edit-input {
  width: 100%; min-height: 36px;
  border: none; background: #FFFDF5;
  font-size: 11px; font-family: 'DM Mono', monospace;
  color: var(--txt); resize: none;
  padding: 3px 4px; line-height: 1.4;
}
.cell-edit-input:focus { outline: none; background: #FFF8DC; }

/* SEEDS row in grid */
.grid-table .seeds-row td { background: var(--pur2); }
.grid-table .seeds-row .col-label { background: var(--pur2); color: var(--pur); }

/* Week divider */
.week-divider { border-left: 2px solid var(--bdr2) !important; }

/* ────────────────────────────────────────────
   PAGE 2 — DAY REPORT
   ──────────────────────────────────────────── */
.session-header {
  margin: 10px;
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 12px 14px;
}
.session-date { font-size: 16px; font-weight: 700; color: var(--txt); margin-bottom: 2px; }
.session-meta { font-size: 11px; color: var(--sub); }
.session-pills {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 10px;
}
.spill {
  padding: 5px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
  border: 1px solid var(--bdr); background: var(--bg);
  color: var(--sub); cursor: pointer;
}
.spill.on { background: var(--acc); color: #fff; border-color: var(--acc); }
.spill.done { background: var(--grn2); color: var(--grn); border-color: #A3E0CF; }
.spill.done::before { content: '✓ '; }

/* Section nav tabs */
.sec-nav {
  display: flex; overflow-x: auto; padding: 0 10px; gap: 4px;
  scrollbar-width: none; margin-bottom: 2px;
}
.sec-nav::-webkit-scrollbar { display: none; }
.sec-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 11px; border-radius: 20px;
  border: 1px solid var(--bdr); background: var(--sur);
  font-size: 12px; font-weight: 500; color: var(--sub);
  white-space: nowrap; cursor: pointer; flex-shrink: 0;
}
.sec-btn .badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px;
  border-radius: 8px; background: var(--hint); color: var(--sur);
}
.sec-btn.on { background: var(--acc); color: #fff; border-color: var(--acc); }
.sec-btn.on .badge { background: rgba(255,255,255,.35); color: #fff; }
.sec-btn.done { background: var(--grn2); color: var(--grn); border-color: #A3E0CF; }
.sec-btn.done .badge { background: var(--grn); color: #fff; }

/* Section panels */
.sec-panel { display: none; }
.sec-panel.on { display: block; }

/* ── Attendance section ── */
.att-field { padding: 12px 14px; border-bottom: 1px solid var(--bdr); }
.att-field:last-child { border-bottom: none; }
.att-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; color: var(--sub); margin-bottom: 5px; }

/* ── Lesson section ── */
.lesson-row {
  padding: 10px 14px;
  border-bottom: 1px solid var(--bdr);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: start;
}
.lesson-row:last-child { border-bottom: none; }
.lesson-item-name {
  font-size: 11px; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .04em;
  margin-bottom: 4px;
}
.lesson-plan-text {
  font-size: 12px; color: var(--mute);
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 5px 8px; line-height: 1.4;
  margin-bottom: 5px;
  font-style: italic;
}
.lesson-plan-text .plan-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); font-weight: 700; margin-right: 4px; font-style: normal; }
.lesson-actual {
  font-size: 13px; color: var(--txt); line-height: 1.4;
}
.lesson-actual.same { color: var(--grn); font-weight: 500; display: flex; align-items: center; gap: 5px; }
.lesson-actual.same::before { content: '✓'; font-weight: 700; }

.lesson-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; padding-top: 20px; }
.tick-btn {
  width: 36px; height: 36px;
  border-radius: 50%; border: 2px solid var(--bdr);
  background: var(--sur); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--mute); flex-shrink: 0;
}
.tick-btn.ticked { background: var(--grn); border-color: var(--grn); color: #fff; font-size: 18px; }
.tick-btn:active { transform: scale(.92); }
.edit-btn {
  width: 28px; height: 28px;
  border-radius: 50%; border: 1px solid var(--bdr);
  background: var(--bg); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--sub); flex-shrink: 0;
}
.edit-btn.active { background: var(--amb2); border-color: var(--amb); color: var(--amb); }
.edit-input-wrap { margin-top: 4px; }

/* ── SEEDS section ── */
.seed-row {
  padding: 12px 14px;
  border-bottom: 1px solid var(--bdr);
}
.seed-row:last-child { border-bottom: none; }
.seed-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.seed-name { font-size: 13px; font-weight: 700; color: var(--txt); }
.seed-focus-badge {
  font-size: 9px; font-weight: 700; letter-spacing: .05em;
  padding: 2px 7px; border-radius: 8px;
  background: var(--amb2); color: var(--amb);
  text-transform: uppercase;
}
.seed-desc { font-size: 10px; color: var(--mute); margin-bottom: 6px; }
.seed-plan { font-size: 11px; color: var(--sub); background: var(--bg); border-radius: 5px; padding: 5px 8px; margin-bottom: 6px; font-style: italic; }
.seed-plan .plan-lbl { font-size: 9px; text-transform: uppercase; color: var(--hint); font-weight: 700; margin-right: 4px; font-style: normal; }
.seed-row.unfocused { opacity: .5; }
.seed-row.has-text { opacity: 1; }

/* ── LOVE++ section ── */
.love-student-wrap { padding: 12px 14px; border-bottom: 1px solid var(--bdr); }
.love-student-wrap:last-child { border-bottom: none; }
.love-student-name { font-size: 14px; font-weight: 700; color: var(--acc); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.love-group { margin-bottom: 10px; }
.love-group-title { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; color: var(--mute); margin-bottom: 5px; }
.love-sub-row { display: grid; grid-template-columns: 64px 1fr; gap: 6px; margin-bottom: 4px; align-items: center; }
.love-sub-lbl { font-size: 11px; color: var(--sub); font-weight: 500; }

/* ── Others section ── */
.other-field { padding: 12px 14px; border-bottom: 1px solid var(--bdr); }
.other-field:last-child { border-bottom: none; }
.other-label { font-size: 11px; font-weight: 700; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
.urgent-inp { border-color: var(--red) !important; }
.urgent-inp:focus { box-shadow: 0 0 0 3px var(--red2) !important; }

/* ── Submit bar ── */
.submit-bar {
  position: fixed; bottom: 58px; left: 0; right: 0;
  background: var(--sur);
  border-top: 1px solid var(--bdr);
  padding: 8px 12px;
  display: none;
  gap: 8px;
  z-index: 50;
}
.submit-bar.on { display: flex; }
.submit-bar .btn { flex: 1; padding: 11px; font-size: 13px; }

/* ── History ── */
.hist-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  active: { background: var(--bg); }
}
.hist-item:last-child { border-bottom: none; }
.hist-date-txt { font-size: 13px; font-weight: 600; }
.hist-meta-txt { font-size: 10px; color: var(--sub); margin-top: 2px; }

/* Stat row */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px; }
.stat-tile { background: var(--sur); border: 1px solid var(--bdr); border-radius: var(--r); padding: 12px 14px; }
.stat-tile .n { font-size: 26px; font-weight: 700; color: var(--acc); }
.stat-tile .l { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }

/* ── Setup ── */
.setup-row { padding: 11px 14px; border-bottom: 1px solid var(--bdr); display: flex; justify-content: space-between; align-items: center; }
.setup-row:last-child { border-bottom: none; }
.setup-key { font-size: 11px; color: var(--sub); font-weight: 500; }
.setup-val { font-size: 13px; font-weight: 600; }

.tip {
  margin: 0 10px 8px;
  padding: 9px 11px;
  background: var(--amb2);
  border-left: 3px solid #D4811A;
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-size: 11px; color: #5B3B00;
}
.empty { text-align: center; padding: 36px 20px; color: var(--hint); font-size: 12px; }

/* PDF hidden render */
.pdf-area { position: fixed; left: -9999px; top: 0; width: 760px; background: #fff; padding: 24px 28px; font-size: 11px; font-family: 'DM Sans', Arial, sans-serif; color: #222; }
.pdf-area h1 { font-size: 17px; font-weight: 700; }
.pdf-area .meta { color: #666; font-size: 10px; margin: 3px 0 14px; }
.pdf-area table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
.pdf-area th { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #999; padding: 4px 7px; border-bottom: 1px solid #ddd; text-align: left; }
.pdf-area td { padding: 5px 7px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
.pdf-area .sec-h { font-size: 12px; font-weight: 700; color: #1B6FC8; border-bottom: 2px solid #1B6FC8; padding-bottom: 3px; margin: 12px 0 6px; }
.pdf-area .urgent-bar { background: #FEF0EF; border-left: 3px solid #C0392B; padding: 6px 10px; font-size: 10px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">EXE <span>·</span> Class Tracker</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="flash" id="save-flash">✓ Saved</span>
    <span class="topbar-info" id="top-class">IN 1 · English</span>
  </div>
</div>

<!-- Pages -->
<div class="page" id="page-plan"></div>
<div class="page on" id="page-today"></div>
<div class="page" id="page-history"></div>
<div class="page" id="page-setup"></div>

<!-- Submit bar (only on Today page) -->
<div class="submit-bar" id="submit-bar">
  <button class="btn" onclick="saveDraft()">💾 Save Draft</button>
  <button class="btn btn-grn" id="submit-btn" onclick="submitReport()">📤 Submit &amp; Share</button>
</div>

<!-- Bottom nav -->
<nav class="botnav">
  <button class="bnav-tab" onclick="goPage('plan')">
    <span class="ico">📅</span>Plan
  </button>
  <button class="bnav-tab on" onclick="goPage('today')">
    <span class="ico">📝</span>Report
  </button>
  <button class="bnav-tab" onclick="goPage('history')">
    <span class="ico">📊</span>History
  </button>
  <button class="bnav-tab" onclick="goPage('setup')">
    <span class="ico">⚙️</span>Setup
  </button>
</nav>

<div class="pdf-area" id="pdf-area"></div>

  { key:'learning', label:'LEARNING', subs:['Reading','Writing','Spelling'] },
  { key:'social', label:'SOCIAL', subs:[''] },
  { key:'behaviour', label:'CLASSROOM BEHAVIOUR', subs:[''] },

  { key:'attention', label:'ATTENTION (issues)', subs:[''] },
];

// ── STATE ───────────────────────────────────────────────────────
const KEY = 'exe_dayreport_v2';
const S = {
  planEditing: false,
  planCells: {},        // overrides to plan cells: key = "date_lessonItem" -> text
  reports: {},          // keyed by sessionId = date + "_" + slot
  currentSessId: null,
  currentSection: 'lesson',
};

function saveAll(flash) {
  localStorage.setItem(KEY, JSON.stringify({ planCells: S.planCells, reports: S.reports }));
  if (flash) { const el = document.getElementById('save-flash'); el.classList.add('on'); setTimeout(() => el.classList.remove('on'), 700); }
}
function loadData() {
  const raw = localStorage.getItem(KEY);
  if (!raw) return;
  try { const p = JSON.parse(raw); if (p.planCells) S.planCells = p.planCells; if (p.reports) S.reports = p.reports; } catch(e) {}
}

// ── HELPERS ─────────────────────────────────────────────────────
const h = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const ha = s => h(s).replace(/\n/g,' ');
function todayISO() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtShort(ds) { return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function fmtLong(ds) { return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function sessId(s) { return s.date+'_'+s.slot; }
function allSessions() { return PLAN.weeks.flatMap(w => w.sessions.map(s=>({...s,week:w}))); }
function sessionById(sid) { return allSessions().find(s=>sessId(s)===sid); }
function weekOfSess(sid) { const s=sessionById(sid); return s?s.week:null; }
function studentById(id) { return PLAN.students.find(s=>s.id===id); }
function planCell(date, item) {
  const k = date+'|'+item;
  if (S.planCells[k] !== undefined) return S.planCells[k];
  const s = allSessions().find(s=>s.date===date);
  return s ? (s.lessons[item]||'') : '';
}
function defaultSessId() {
  const t = todayISO();
  const all = allSessions();
  return (all.find(s=>s.date===t) || all.find(s=>s.date>=t) || all[all.length-1])?.date + '_' + (all.find(s=>s.date===t)||all.find(s=>s.date>=t)||all[all.length-1])?.slot;
}
function blankReport(sid) {
  const s = sessionById(sid); const w = weekOfSess(sid);
  if (!s||!w) return null;
  const la = {}; LESSON_ITEMS.forEach(k => la[k] = { state:'empty', custom:'' });
  const se = {}; SEEDS.forEach(si => se[si.key] = '');
  const lo = {}; w.loveFocus.forEach(id => { lo[id]={}; LOVE_GROUPS.forEach(g=>{ if(g.subs[0]==='') lo[id][g.key]=''; else g.subs.forEach(sub=>lo[id][g.key+'_'+sub.toLowerCase()]=''); }); });
  return { sessionId:sid, date:s.date, slot:s.slot, attendance:{late:'',absent:''}, lessonsActual:la, seedsExec:se, loveObs:lo, other:{goodProgress:'',needAttention:'',urgent:''}, submittedAt:null, savedAt:new Date().toISOString() };
}
function getReport(sid) { if (!S.reports[sid]) S.reports[sid]=blankReport(sid); return S.reports[sid]; }

// ── NAV ─────────────────────────────────────────────────────────
function goPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.bnav-tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  const idx = {plan:0,today:1,history:2,setup:3}[p];
  document.querySelectorAll('.bnav-tab')[idx]?.classList.add('on');
  document.getElementById('submit-bar').classList.toggle('on', p==='today');
  if (p==='plan')    renderPlan();
  if (p==='today')   renderToday();
  if (p==='history') renderHistory();
  if (p==='setup')   renderSetup();
}

// ── PAGE 1: LESSON PLAN GRID ─────────────────────────────────────
function renderPlan() {
  const sessions = allSessions();
  const today = todayISO();

  // Build header row
  let headCols = `<th class="col-corner"><div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em">Lesson Item</div></th>`;
  sessions.forEach((s,i) => {
    const cls = s.date===today?'today-col':s.date<today?'past-col':'';
    const wkColor = ['#1B6FC8','#0D7A5F','#B45309','#6B3FA0'][s.week.n-1];
    const isFirst = s===s.week.sessions[0];
    const divider = isFirst&&i>0?'week-divider':'';
    headCols += `<th class="col-date ${cls} ${divider}">
      ${isFirst?`<div class="wk-badge" style="background:${wkColor}20;color:${wkColor}">${s.week.label}</div>`:''}
      <div>${s.day}</div>
      <div style="font-size:9px;margin-top:1px">${fmtShort(s.date).replace(/\w+,\s*/,'')}</div>
      <div style="font-size:9px;color:var(--mute)">${s.slot}</div>
    </th>`;
  });

  // Build lesson rows
  let bodyRows = '';
  LESSON_ITEMS.forEach(item => {
    let row = `<tr><td class="col-label">${item}</td>`;
    sessions.forEach((s,i) => {
      const cls = s.date===today?'today-col':s.date<today?'past-col':'';
      const divider = s===s.week.sessions[0]&&i>0?'week-divider':'';
      const cellKey = s.date+'|'+item;
      const val = planCell(s.date, item);
      row += `<td class="col-data ${cls} ${divider} ${val?'':'empty-cell'}" data-key="${h(cellKey)}" data-date="${s.date}" data-item="${ha(item)}" onclick="planCellClick(this)">`;
      if (S.planEditing) {
        row += `<textarea class="cell-edit-input" onblur="savePlanCell('${h(cellKey)}',this.value)" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${h(val)}</textarea>`;
      } else {
        row += val ? h(val).replace(/\n/g,'<br>') : '<span style="color:var(--hint)">—</span>';
      }
      row += `</td>`;
    });
    row += `</tr>`;
    bodyRows += row;
  });

  // SEEDS focus row
  let seedsRow = `<tr class="seeds-row"><td class="col-label" style="font-size:10px;color:var(--pur);font-weight:700">🌱 SEEDS focus</td>`;
  sessions.forEach((s,i) => {
    const divider = s===s.week.sessions[0]&&i>0?'week-divider':'';
    const focus = s.week.seedsFocus.join(' + ');
    seedsRow += `<td class="col-data ${divider}" style="font-size:10px;color:var(--pur);background:var(--pur2)">${h(focus)}</td>`;
  });
  seedsRow += `</tr>`;

  // LOVE++ focus row
  let loveRow = `<tr><td class="col-label" style="font-size:10px;color:var(--acc);font-weight:700">❤️ LOVE++ focus</td>`;
  sessions.forEach((s,i) => {
    const divider = s===s.week.sessions[0]&&i>0?'week-divider':'';
    const names = s.week.loveFocus.map(id=>studentById(id)?.name||id).join('\n');
    loveRow += `<td class="col-data ${divider}" style="font-size:10px;color:var(--acc)">${h(names).replace(/\n/g,'<br>')}</td>`;
  });
  loveRow += `</tr>`;

  // Notes row
  let notesRow = `<tr><td class="col-label" style="font-size:10px;font-weight:700;color:var(--sub)">📌 Notes</td>`;
  sessions.forEach((s,i) => {
    const divider = s===s.week.sessions[0]&&i>0?'week-divider':'';
    notesRow += `<td class="col-data ${divider}" style="font-size:10px;color:var(--sub);font-style:italic">${h(s.week.notes||'')}</td>`;
  });
  notesRow += `</tr>`;

  const editMode = S.planEditing;

  document.getElementById('page-plan').innerHTML = `
    <div class="plan-toolbar">
      <div>
        <div style="font-size:14px;font-weight:700">📅 Lesson Plan</div>
        <div style="font-size:10px;color:var(--sub)">4 weeks · 8 sessions · scroll →</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="plan-mode-badge ${editMode?'edit':'view'}">${editMode?'✏️ EDITING':'🔒 VIEW'}</span>
        <button class="btn btn-sm" onclick="togglePlanEdit()">${editMode?'✓ Done':'✏️ Edit Plan'}</button>
      </div>
    </div>
    <div class="grid-wrap">
      <table class="grid-table">
        <thead><tr>${headCols}</tr></thead>
        <tbody>${bodyRows}${seedsRow}${loveRow}${notesRow}</tbody>
      </table>
    </div>
    <div style="margin:0 10px;font-size:10px;color:var(--mute);padding-bottom:8px">
      🔵 Today &nbsp; ◻ Future &nbsp; ▫ Past &nbsp;&nbsp; Tap ✏️ Edit Plan to update lesson content.
    </div>
  `;

  // Scroll today column into view
  requestAnimationFrame(() => {
    const todayCell = document.querySelector('.col-date.today-col');
    if (todayCell) todayCell.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
}

function togglePlanEdit() {
  S.planEditing = !S.planEditing;
  renderPlan();
}
function planCellClick(el) {
  if (!S.planEditing) return;
  const ta = el.querySelector('textarea');
  if (ta) ta.focus();
}
function savePlanCell(key, val) {
  S.planCells[key] = val;
  saveAll(true);
}

// ── PAGE 2: DAY REPORT ───────────────────────────────────────────
function renderToday() {
  if (!S.currentSessId || !sessionById(S.currentSessId)) S.currentSessId = defaultSessId();
  const sid = S.currentSessId;
  const s = sessionById(sid);
  const w = weekOfSess(sid);
  if (!s||!w) { document.getElementById('page-today').innerHTML = `<div class="empty">No sessions found.</div>`; return; }
  const r = getReport(sid);
  const today = todayISO();

  // Session pills
  const pills = allSessions().map(sx => {
    const xid = sessId(sx);
    const isOn = xid===sid;
    const isDone = !!S.reports[xid]?.submittedAt;
    const cls = isOn?'on':isDone?'done':'';
    return `<span class="spill ${cls}" onclick="switchSess('${xid}')">${fmtShort(sx.date)} ${sx.slot.replace('Slot ','S')}</span>`;
  }).join('');

  const isToday = s.date===today;
  const isFuture = s.date>today;

  // Section progress
  const prog = sectionProgress(r, s, w);

  // Section buttons
  const secs = [
    { key:'attendance', icon:'👥', label:'Attend.', prog:prog.attendance },
    { key:'lesson',     icon:'📚', label:'Lesson',  prog:prog.lesson },
    { key:'seeds',      icon:'🌱', label:'SEEDS',   prog:prog.seeds },
    { key:'love',       icon:'❤️',  label:'LOVE++',  prog:prog.love },
    { key:'others',     icon:'⚠️',  label:'Others',  prog:prog.others },
  ];
  const secBtns = secs.map(sec => {
    const isOn = S.currentSection===sec.key;
    const isDone = sec.prog.done >= sec.prog.total && sec.prog.total > 0;
    const cls = isOn?'on':isDone?'done':'';
    const badge = sec.prog.total>0 ? `<span class="badge">${sec.prog.done}/${sec.prog.total}</span>` : '';
    return `<button class="sec-btn ${cls}" onclick="switchSection('${sec.key}')">${sec.icon} ${sec.label}${badge}</button>`;
  }).join('');

  let html = '';

  // Session header
  html += `<div class="session-header">
    <div class="session-date">${fmtLong(s.date)}</div>
    <div class="session-meta">
      ${PLAN.meta.className} · ${PLAN.meta.subject} · ${s.slot} · Week ${w.n}
      ${isToday?'<span style="color:var(--grn);font-weight:700;margin-left:6px">● TODAY</span>':isFuture?'<span style="color:var(--amb);margin-left:6px">upcoming</span>':''}
    </div>
    <div class="session-pills">${pills}</div>
  </div>`;

  if (r.submittedAt) {
    html += `<div class="tip" style="background:var(--grn2);border-left-color:var(--grn);color:var(--grn)">✓ Submitted ${new Date(r.submittedAt).toLocaleString('en-GB')}. You can still edit and re-submit.</div>`;
  }
  if (w.notes) html += `<div class="tip">📌 Week ${w.n}: ${h(w.notes)}</div>`;

  // Section nav
  html += `<div class="sec-nav">${secBtns}</div>`;

  // Section panels
  html += renderAttendancePanel(r);
  html += renderLessonPanel(r, s, w);
  html += renderSeedsPanel(r, w);
  html += renderLovePanel(r, w);
  html += renderOthersPanel(r);

  document.getElementById('page-today').innerHTML = html;
  bindTodayInputs(r, s, w);
}

function sectionProgress(r, s, w) {
  const att = { done: (r.attendance.late||r.attendance.absent)?1:0, total:1 };
  let lessonDone = 0;
  LESSON_ITEMS.forEach(k => { if (r.lessonsActual[k]?.state==='same'||r.lessonsActual[k]?.state==='custom') lessonDone++; });
  const lesson = { done:lessonDone, total:LESSON_ITEMS.length };
  let seedsDone = 0;
  const seedsTotal = w.seedsFocus.length;
  w.seedsFocus.forEach(k => { if (r.seedsExec[k]) seedsDone++; });
  const seeds = { done:seedsDone, total:seedsTotal };
  let loveDone = 0;
  w.loveFocus.forEach(sid => { const obs=r.loveObs[sid]||{}; if(Object.values(obs).some(v=>v)) loveDone++; });
  const love = { done:loveDone, total:w.loveFocus.length };
  const others = { done:(r.other.goodProgress||r.other.needAttention||r.other.urgent)?1:0, total:1 };
  return { attendance:att, lesson, seeds, love, others };
}

function renderAttendancePanel(r) {
  return `<div class="sec-panel card ${S.currentSection==='attendance'?'on':''}" id="panel-attendance">
    <div class="card-hdr"><div class="card-hdr-title">👥 Attendance</div></div>
    <div class="att-field">
      <div class="att-label">Regular Late — name, time, reason</div>
      <textarea class="inp" data-f="attendance.late" placeholder="e.g. Tan XX arrived 9:15am (mum overslept)">${h(r.attendance.late)}</textarea>
    </div>
    <div class="att-field">
      <div class="att-label">Regular Absent — name, reason</div>
      <textarea class="inp" data-f="attendance.absent" placeholder="e.g. Chen XX (doctor appointment)">${h(r.attendance.absent)}</textarea>
    </div>
    <div class="att-field" style="padding:8px 14px">
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--sub);cursor:pointer">
        <input type="checkbox" data-f="attendance.allPresent" ${r.attendance.allPresent?'checked':''} style="width:16px;height:16px">
        All present — no issues today
      </label>
    </div>
  </div>`;
}

function renderLessonPanel(r, s, w) {
  let rows = '';
  LESSON_ITEMS.forEach(item => {
    const la = r.lessonsActual[item] || { state:'empty', custom:'' };
    const planned = planCell(s.date, item);
    const isTicked = la.state==='same';
    const isCustom = la.state==='custom';
    const isEmpty  = la.state==='empty';

    let actualDisplay = '';
    if (isTicked) actualDisplay = `<div class="lesson-actual same">${h(planned).replace(/\n/g,' ')}</div>`;
    else if (isCustom) actualDisplay = `<div class="edit-input-wrap"><textarea class="inp" data-f="lesson.${ha(item)}" placeholder="What actually happened...">${h(la.custom)}</textarea></div>`;
    else actualDisplay = `<div style="color:var(--hint);font-size:12px;font-style:italic">Not yet filled</div>`;

    rows += `<div class="lesson-row">
      <div style="flex:1;min-width:0">
        <div class="lesson-item-name">${item}</div>
        <div class="lesson-plan-text"><span class="plan-lbl">Plan</span>${h(planned).replace(/\n/g,' ') || '—'}</div>
        ${actualDisplay}
      </div>
      <div class="lesson-actions">
        <button class="tick-btn ${isTicked?'ticked':''}" data-li="${ha(item)}" onclick="tickLesson('${ha(item)}')" title="Same as plan">✓</button>
        <button class="edit-btn ${isCustom?'active':''}" data-li="${ha(item)}" onclick="editLesson('${ha(item)}')" title="Edit actual">✏️</button>
      </div>
    </div>`;
  });
  return `<div class="sec-panel card ${S.currentSection==='lesson'?'on':''}" id="panel-lesson">
    <div class="card-hdr">
      <div class="card-hdr-title">📚 Lesson</div>
      <div style="font-size:10px;color:var(--sub)">✓ = same as plan &nbsp;✏️ = edit actual</div>
    </div>
    ${rows}
  </div>`;
}

function renderSeedsPanel(r, w) {
  let rows = '';
  SEEDS.forEach(si => {
    const isFocus = w.seedsFocus.includes(si.key);
    const plan = w.seedsPlanned[si.key] || '';
    const exec = r.seedsExec[si.key] || '';
    const hasText = !!exec;
    rows += `<div class="seed-row ${!isFocus&&!hasText?'unfocused':''} ${hasText?'has-text':''}">
      <div class="seed-header">
        <span class="seed-name">${si.key}</span>
        ${isFocus?`<span class="seed-focus-badge">⭐ Focus</span>`:''}
      </div>
      <div class="seed-desc">${si.desc}</div>
      ${plan?`<div class="seed-plan"><span class="plan-lbl">Plan</span>${h(plan)}</div>`:''}
      <textarea class="inp" data-f="seeds.${ha(si.key)}" placeholder="${isFocus?'What you actually did today':'(optional)'}">${h(exec)}</textarea>
    </div>`;
  });
  return `<div class="sec-panel card ${S.currentSection==='seeds'?'on':''}" id="panel-seeds">
    <div class="card-hdr">
      <div class="card-hdr-title">🌱 SEEDS 5</div>
      <div style="font-size:10px;color:var(--sub)">⭐ = this week's focus</div>
    </div>
    ${rows}
  </div>`;
}

function renderLovePanel(r, w) {
  let content = '';
  w.loveFocus.forEach(sid => {
    const st = studentById(sid);
    const obs = r.loveObs[sid] || {};
    let groups = '';
    LOVE_GROUPS.forEach(g => {
      let fields = '';
      if (g.subs[0]==='') {
        fields = `<textarea class="inp" data-f="love.${sid}.${g.key}" placeholder="${g.label}">${h(obs[g.key]||'')}</textarea>`;
      } else {
        g.subs.forEach(sub => {
          const fk = g.key+'_'+sub.toLowerCase();
          fields += `<div class="love-sub-row">
            <span class="love-sub-lbl">${sub}</span>
            <input class="inp" data-f="love.${sid}.${fk}" value="${ha(obs[fk]||'')}">
          </div>`;
        });
      }
      groups += `<div class="love-group"><div class="love-group-title">${g.label}</div>${fields}</div>`;
    });
    content += `<div class="love-student-wrap">
      <div class="love-student-name">❤️ ${h(st?.name||sid)}</div>
      ${groups}
    </div>`;
  });
  return `<div class="sec-panel card ${S.currentSection==='love'?'on':''}" id="panel-love">
    <div class="card-hdr"><div class="card-hdr-title">❤️ LOVE++ — Focused students this week</div></div>
    <div style="padding:8px 14px;font-size:10px;color:var(--sub);border-bottom:1px solid var(--bdr)">1 specific observation ❤️  &gt;  10 general statements. Skip if nothing special.</div>
    ${content}
  </div>`;
}

function renderOthersPanel(r) {
  return `<div class="sec-panel card ${S.currentSection==='others'?'on':''}" id="panel-others">
    <div class="card-hdr"><div class="card-hdr-title">⚠️ Other Students</div></div>
    <div class="other-field">
      <div class="other-label"><span style="color:var(--grn)">✅</span>Good Progress <span style="font-size:10px;color:var(--mute)">(name + what)</span></div>
      <textarea class="inp" data-f="other.goodProgress" placeholder="e.g. Ng XX first time scored 5/5 in spelling!">${h(r.other.goodProgress)}</textarea>
    </div>
    <div class="other-field">
      <div class="other-label"><span style="color:var(--amb)">⚠️</span>Need Attention <span style="font-size:10px;color:var(--mute)">(name + what)</span></div>
      <textarea class="inp" data-f="other.needAttention" placeholder="e.g. Lim XX throws tantrum when...">${h(r.other.needAttention)}</textarea>
    </div>
    <div class="other-field">
      <div class="other-label" style="color:var(--red)">🚨 URGENT! <span style="font-size:10px;font-weight:400">— requires MGMT attention</span></div>
      <textarea class="inp urgent-inp" data-f="other.urgent" placeholder="Suspect Tan XX has memory issues — please test.">${h(r.other.urgent)}</textarea>
    </div>
  </div>`;
}

function switchSection(sec) {
  S.currentSection = sec;
  document.querySelectorAll('.sec-btn').forEach((el,i) => {
    const keys = ['attendance','lesson','seeds','love','others'];
    el.classList.toggle('on', keys[i]===sec);
  });
  document.querySelectorAll('.sec-panel').forEach(el => {
    el.classList.toggle('on', el.id==='panel-'+sec);
  });
  // scroll panel into view
  setTimeout(() => {
    const panel = document.getElementById('panel-'+sec);
    if (panel) panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

function switchSess(sid) {
  S.currentSessId = sid;
  saveAll(false);
  renderToday();
  window.scrollTo(0,0);
}

// Bind all inputs in today page
function bindTodayInputs(r, s, w) {
  document.querySelectorAll('#page-today [data-f]').forEach(el => {
    const onChange = () => {
      const parts = el.dataset.f.split('.');
      if (parts[0]==='attendance') {
        if (parts[1]==='allPresent') r.attendance.allPresent = el.checked;
        else r.attendance[parts[1]] = el.value;
      } else if (parts[0]==='seeds') {
        r.seedsExec[parts[1]] = el.value;
      } else if (parts[0]==='love') {
        if (!r.loveObs[parts[1]]) r.loveObs[parts[1]] = {};
        r.loveObs[parts[1]][parts[2]] = el.value;
      } else if (parts[0]==='other') {
        r.other[parts[1]] = el.value;
      } else if (parts[0]==='lesson') {
        if (!r.lessonsActual[parts[1]]) r.lessonsActual[parts[1]] = { state:'empty', custom:'' };
        r.lessonsActual[parts[1]].custom = el.value;
        if (el.value) r.lessonsActual[parts[1]].state = 'custom';
      }
      r.savedAt = new Date().toISOString();
      saveAll(false);
      refreshSectionBadges(r, s, w);
    };
    el.addEventListener('input', onChange);
    el.addEventListener('change', onChange);
    el.addEventListener('blur', () => saveAll(true));
  });
}

function refreshSectionBadges(r, s, w) {
  const prog = sectionProgress(r, s, w);
  const secs = [
    { key:'attendance', prog:prog.attendance },
    { key:'lesson',     prog:prog.lesson },
    { key:'seeds',      prog:prog.seeds },
    { key:'love',       prog:prog.love },
    { key:'others',     prog:prog.others },
  ];
  document.querySelectorAll('.sec-btn').forEach((btn, i) => {
    const sec = secs[i];
    const isDone = sec.prog.done>=sec.prog.total && sec.prog.total>0;
    const isOn = S.currentSection===sec.key;
    btn.className = 'sec-btn' + (isOn?' on':isDone?' done':'');
    const badge = btn.querySelector('.badge');
    if (badge && sec.prog.total>0) badge.textContent = `${sec.prog.done}/${sec.prog.total}`;
  });
}

function tickLesson(item) {
  const r = getReport(S.currentSessId);
  if (!r.lessonsActual[item]) r.lessonsActual[item] = { state:'empty', custom:'' };
  const la = r.lessonsActual[item];
  la.state = la.state==='same' ? 'empty' : 'same';
  r.savedAt = new Date().toISOString();
  saveAll(true);
  renderToday();
}
function editLesson(item) {
  const r = getReport(S.currentSessId);
  if (!r.lessonsActual[item]) r.lessonsActual[item] = { state:'empty', custom:'' };
  const la = r.lessonsActual[item];
  la.state = la.state==='custom' ? 'empty' : 'custom';
  r.savedAt = new Date().toISOString();
  saveAll(false);
  renderToday();
  setTimeout(() => {
    const ta = document.querySelector(`[data-f="lesson.${item}"]`);
    if (ta) { ta.focus(); ta.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  }, 100);
}

function saveDraft() { saveAll(true); }

// ── PAGE 3: HISTORY ──────────────────────────────────────────────
function renderHistory() {
  const all = Object.values(S.reports).sort((a,b)=>b.date.localeCompare(a.date));
  const submitted = all.filter(r=>r.submittedAt);
  const drafts = all.filter(r=>!r.submittedAt);
  let h2 = `<div class="stat-row">
    <div class="stat-tile"><div class="n">${submitted.length}</div><div class="l">Submitted</div></div>
    <div class="stat-tile"><div class="n" style="color:var(--amb)">${drafts.length}</div><div class="l">Drafts</div></div>
  </div>`;
  h2 += `<div class="card"><div class="card-hdr"><div class="card-hdr-title">📤 Submitted Reports</div></div>`;
  if (!submitted.length) h2 += `<div class="empty">No submitted reports yet.</div>`;
  else submitted.forEach(r => {
    h2 += `<div class="hist-item" onclick="switchSess('${r.sessionId}');goPage('today')">
      <div><div class="hist-date-txt">${fmtShort(r.date)} · ${r.slot}</div><div class="hist-meta-txt">Submitted ${new Date(r.submittedAt).toLocaleString('en-GB')}</div></div>
      <button class="btn btn-sm" onclick="event.stopPropagation();resharePDF('${r.sessionId}')">Re-share</button>
    </div>`;
  });
  h2 += `</div><div class="card"><div class="card-hdr"><div class="card-hdr-title">📝 Drafts</div></div>`;
  if (!drafts.length) h2 += `<div class="empty">No drafts.</div>`;
  else drafts.forEach(r => {
    h2 += `<div class="hist-item" onclick="switchSess('${r.sessionId}');goPage('today')">
      <div><div class="hist-date-txt">${fmtShort(r.date)} · ${r.slot}</div><div class="hist-meta-txt">Edited ${new Date(r.savedAt||Date.now()).toLocaleString('en-GB')}</div></div>
      <span style="font-size:10px;color:var(--mute)">draft</span>
    </div>`;
  });
  h2 += `</div>`;
  document.getElementById('page-history').innerHTML = h2;
}

function exportData() {
  const blob = new Blob([JSON.stringify({planCells:S.planCells,reports:S.reports},null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`dayreport_backup_${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
}
function clearData() {
  if (!confirm('Delete ALL local data? Cannot undo.')) return;
  localStorage.removeItem(KEY);
  S.reports = {}; S.planCells = {};
  renderToday(); renderHistory(); alert('Cleared.');
}

// ── PDF GENERATION ───────────────────────────────────────────────
function buildPDFHTML(sid) {
  const s = sessionById(sid); const w = weekOfSess(sid); const r = S.reports[sid];
  if (!s||!w||!r) return '';

  const lessonRows = LESSON_ITEMS.map(item => {
    const la = r.lessonsActual[item]||{state:'empty',custom:''};
    const plan = planCell(s.date,item)||'—';
    const actual = la.state==='same'?'✓ Same as plan': la.state==='custom'&&la.custom?la.custom:'—';
    const diff = la.state==='custom' && la.custom !== plan;
    return `<tr><td style="width:110px;font-weight:600">${item}</td><td style="color:#666;width:45%">${h(plan).replace(/\n/g,' ')}</td><td style="${diff?'background:#FFF8E1':''}${la.state==='same'?'color:#0D7A5F;font-weight:600':''}">${h(actual)}</td></tr>`;
  }).join('');

  const seedsRows = SEEDS.filter(si=>w.seedsFocus.includes(si.key)||r.seedsExec[si.key]).map(si => {
    const focus = w.seedsFocus.includes(si.key);
    return `<tr><td style="width:130px;font-weight:600${focus?';color:#B45309':''}">${si.key}${focus?' ⭐':''}</td><td style="color:#666;width:45%">${h(w.seedsPlanned[si.key]||'—')}</td><td>${h(r.seedsExec[si.key]||'—')}</td></tr>`;
  }).join('');

  const loveHTML = w.loveFocus.map(sid2 => {
    const st = studentById(sid2);
    const obs = r.loveObs[sid2]||{};
    const rows = Object.entries(obs).filter(([,v])=>v).map(([k,v])=>`<tr><td style="width:160px;font-weight:600;color:#555">${k.replace(/_/g,' ')}</td><td>${h(v)}</td></tr>`).join('');
    if (!rows) return '';
    return `<div class="sec-h">❤️ LOVE++ — ${st?.name||sid2}</div><table><tbody>${rows}</tbody></table>`;
  }).join('');

  return `
    <h1>Day Report — ${PLAN.meta.className} · ${PLAN.meta.subject}</h1>
    <div class="meta">${fmtLong(s.date)} · ${s.slot} · Week ${w.n} · ${PLAN.meta.teacher}</div>
    ${r.other.urgent?`<div class="urgent-bar"><b>🚨 URGENT:</b> ${h(r.other.urgent)}</div>`:''}
    <div class="sec-h">1 · Attendance</div>
    <table><tbody>
      <tr><td style="width:130px;font-weight:600;color:#555">Regular late</td><td>${h(r.attendance.late)||'—'}</td></tr>
      <tr><td style="font-weight:600;color:#555">Regular absent</td><td>${h(r.attendance.absent)||'—'}</td></tr>
    </tbody></table>
    <div class="sec-h">2 · Lesson — Planned vs Actual</div>
    <table><thead><tr><th>Item</th><th>Planned</th><th>Actual</th></tr></thead><tbody>${lessonRows}</tbody></table>
    <div class="sec-h">3 · SEEDS 5 (⭐ = week focus)</div>
    <table><thead><tr><th>Seed</th><th>Planned</th><th>Executed</th></tr></thead><tbody>${seedsRows||'<tr><td colspan="3" style="color:#999;font-style:italic">—</td></tr>'}</tbody></table>
    ${loveHTML}
    <div class="sec-h">5 · Other Students</div>
    <table><tbody>
      ${r.other.goodProgress?`<tr><td style="width:130px;font-weight:600;color:#0D7A5F">✅ Good Progress</td><td>${h(r.other.goodProgress)}</td></tr>`:''}
      ${r.other.needAttention?`<tr><td style="font-weight:600;color:#B45309">⚠️ Need Attention</td><td>${h(r.other.needAttention)}</td></tr>`:''}
      ${!r.other.goodProgress&&!r.other.needAttention?'<tr><td colspan="2" style="color:#999;font-style:italic">—</td></tr>':''}
    </tbody></table>
    <div style="margin-top:18px;font-size:9px;color:#bbb;border-top:1px solid #eee;padding-top:6px">Generated ${new Date().toLocaleString('en-GB')} · EXE Class Tracker v2</div>
  `;
}

async function generateAndShare(sid) {
  const area = document.getElementById('pdf-area');
  area.innerHTML = buildPDFHTML(sid);
  const canvas = await html2canvas(area, { scale:2, backgroundColor:'#fff', useCORS:true });
  area.innerHTML = '';
  const imgData = canvas.toDataURL('image/jpeg', 0.92);
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight(), m = 10;
  const uw = pw-m*2, ih = canvas.height*uw/canvas.width;
  if (ih <= ph-m*2) {
    pdf.addImage(imgData,'JPEG',m,m,uw,ih);
  } else {
    let oy=0; const cph=canvas.width*(ph-m*2)/uw;
    while (oy<canvas.height) {
      const sc=document.createElement('canvas'); sc.width=canvas.width; sc.height=Math.min(cph,canvas.height-oy);
      const ctx=sc.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,sc.width,sc.height);
      ctx.drawImage(canvas,0,oy,canvas.width,sc.height,0,0,canvas.width,sc.height);
      if (oy>0) pdf.addPage();
      pdf.addImage(sc.toDataURL('image/jpeg',0.92),'JPEG',m,m,uw,sc.height*uw/canvas.width);
      oy+=cph;
    }
  }
  const blob = pdf.output('blob');
  const r = S.reports[sid];
  const fn = `DayReport_${PLAN.meta.className.replace(/\s/g,'')}_${r.date}_${r.slot.replace(/\s/g,'')}.pdf`;
  const file = new File([blob], fn, { type:'application/pdf' });
  if (navigator.canShare?.({ files:[file] })) {
    try { await navigator.share({ files:[file], title:'Day Report', text:`${PLAN.meta.teacher} — ${fmtShort(r.date)}` }); return 'shared'; }
    catch(e) { if (e.name==='AbortError') return 'cancelled'; }
  }
  const url = URL.createObjectURL(blob);
  window.open(url,'_blank');
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
  return 'newtab';
}

async function submitReport() {
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='⏳ Generating…';
  try {
    const result = await generateAndShare(S.currentSessId);
    if (result!=='cancelled') {
      S.reports[S.currentSessId].submittedAt = new Date().toISOString();
      saveAll(true);
      renderToday();
    }
    if (result==='newtab') alert('PDF opened in a new tab.\n\nOn mobile, use your browser\'s share button to send it to WhatsApp or Email.\n\n(Phase 2 sends directly to admin dashboard.)');
  } catch(e) { alert('PDF error: '+e.message); }
  btn.disabled=false; btn.textContent='📤 Submit & Share';
}
async function resharePDF(sid) {
  const prev = S.currentSessId; S.currentSessId=sid;
  try { await generateAndShare(sid); } catch(e){alert(e.message);}
  S.currentSessId=prev;
}

loadData();
S.currentSessId = S.currentSessId || defaultSessId();
S.currentSection = 'lesson';
goPage('today');
</script>
